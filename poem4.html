<header class="header">
تم إنشاء هذه الصفحة بواسطة محمد طاطي و شعيب الموناوي
</header>

<div class="poem-container">
<h2>قصيدة النجاح</h2>
<p>
بالجدِّ تُبنى المعالي في مسالكِنا
وبالصبرِ نبلغُ أعلى المجدِ والسكنِ

لا تستسلمْ إن تعثّرتَ في خطوةٍ
فالنجحُ يولدُ بعد الجهدِ والتعبِ
</p>
