<header class="header">
تم إنشاء هذه الصفحة بواسطة محمد طاطي و شعيب الموناوي
</header>

<div class="poem-container">
<h2>قصيدة الصداقة</h2>
<p>
الصديقُ مرآةُ روحٍ صادقةْ
في حضورهِ تختفي كلُّ الضيقةْ

إن غبتَ يوماً ظلَّ يسألُ عنكَ
ويحملُ الودَّ في قلبٍ وثيقةْ
</p>
