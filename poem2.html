    <h1>قصيدة الأمل</h1>

    <div class="poem-box">
        <pre>
لا تيأسنَّ إذا ما ضاق بك الزمنُ
فالنور يولدُ من أحشائهِ المحنُ

وازرع بصدرك حلماً لا يفارقُهُ
فالحلمُ مفتاحُ أبوابٍ بها الفتنُ
        </pre>
