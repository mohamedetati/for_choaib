<header class="header">
تم إنشاء هذه الصفحة بواسطة محمد طاطي و شعيب الموناوي
</header>

<div class="poem-container">
<h2>قصيدة الحياة</h2>
<p>
الحياةُ طريقٌ فيهِ منعرجٌ
وفيهِ وردٌ وأشواكٌ لمن عرجوا

فامشِ بثقةِ قلبٍ لا يُهزمهُ
خوفُ الليالي ولا همٌّ ولا حرجُ
</p>
